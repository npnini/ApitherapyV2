<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Preview - ApitherapyCare</title>
    <style>
        body {
            margin: 0;
            background-color: #0d1117;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
        }

        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(22, 27, 34, 0.8);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #30363d;
            pointer-events: auto;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #58a6ff;
        }

        .control-group {
            margin-bottom: 10px;
        }

        button {
            background: #238636;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            background: #2ea043;
        }

        .instructions {
            font-size: 12px;
            color: #8b949e;
            margin-top: 15px;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #58a6ff;
        }
    </style>
</head>

<body>
    <div id="loading">Loading Model...</div>
    <div id="ui-overlay">
        <h1>3D Model Preview</h1>
        <div class="control-group">
            <button id="toggle-rotate">Stop Rotation</button>
        </div>
        <div class="instructions">
            • <b>Left Click:</b> Orbit<br>
            • <b>Right Click:</b> Pan<br>
            • <b>Scroll:</b> Zoom
        </div>
    </div>
    <div id="canvas-container"></div>

    <!-- Three.js from CDN -->
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, model;
        let isRotating = true;

        const modelUrl = 'https://raw.githubusercontent.com/Antonio-Abrao/acu-master/master/src/three/modelo/corpo.obj';
        const textureUrl = 'https://raw.githubusercontent.com/Antonio-Abrao/acu-master/master/src/three/textura/UV_Grid_Sm.jpg';

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0d1117);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 2000);
            camera.position.set(0, 50, 200);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(0, 1, 1).normalize();
            scene.add(directionalLight);

            const backLight = new THREE.DirectionalLight(0xffffff, 0.5);
            backLight.position.set(0, 1, -1).normalize();
            scene.add(backLight);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            const textureLoader = new THREE.TextureLoader();
            const texture = textureLoader.load(textureUrl);

            const loader = new OBJLoader();
            loader.load(modelUrl, function (object) {
                model = object;
                model.traverse(function (child) {
                    if (child.isMesh) {
                        child.material.map = texture;
                    }
                });

                // Center model
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center);

                scene.add(model);
                document.getElementById('loading').style.display = 'none';
            },
                function (xhr) {
                    console.log((xhr.loaded / xhr.total * 100) + '% loaded');
                },
                function (error) {
                    console.error('An error happened', error);
                    document.getElementById('loading').innerText = 'Error loading model. Check CORS or URL.';
                });

            window.addEventListener('resize', onWindowResize);

            document.getElementById('toggle-rotate').addEventListener('click', function () {
                isRotating = !isRotating;
                this.innerText = isRotating ? 'Stop Rotation' : 'Start Rotation';
                this.style.background = isRotating ? '#238636' : '#8b949e';
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (model && isRotating) {
                model.rotation.y += 0.005;
            }
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>

</html>
